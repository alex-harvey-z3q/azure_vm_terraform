---
# delete_temp_user.yml
# Usage: -e "booking_username=nste-jsmith booking_id=BK-001"

- name: Delete temporary local user from NSTE Jumphost
  hosts: windows
  gather_facts: false
  become: false

  tasks:
    - name: Force log off any active sessions for this user
      ansible.windows.win_shell: |
        $sessions = query session {{ booking_username }} 2>$null
        if ($LASTEXITCODE -eq 0 -and $sessions) {
          $sessionId = ($sessions -split '\s+' | Where-Object { $_ -match '^\d+$' })[0]
          if ($sessionId) { logoff $sessionId /server:localhost }
        }
      register: logoff_result
      failed_when: false

    - name: Delete local user account
      ansible.windows.win_user:
        name: "{{ booking_username }}"
        state: absent

    - name: Remove temp password file
      ansible.builtin.file:
        path: /tmp/nste_temp_password.txt
        state: absent
      delegate_to: localhost

    - name: Log deletion
      ansible.builtin.debug:
        msg: "Temp account deleted: {{ booking_username }} | Booking: {{ booking_id }}"
